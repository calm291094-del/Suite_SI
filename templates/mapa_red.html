{% extends 'base.html' %}
{% block titulo %}Mapa de Red{% endblock %}
{% block contenido %}
<div class="admin-page">
    <div class="page-header">
        <h1><i class="fas fa-network-wired"></i> Mapa de Red Interactivo</h1>
        <p class="text-muted">Topología lógica de la red institucional. Res. 128/2019 Art. 18.</p>
    </div>

    <!-- Leyenda del mapa -->
    <div style="display: flex; gap: 20px; margin-bottom: 20px; padding: 15px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 10px;">
        <div style="display: flex; align-items: center; gap: 8px;">
            <i class="fas fa-building" style="color: var(--accent-blue); font-size: 1.2rem;"></i>
            <span style="color: var(--text-secondary); font-size: 0.9rem;">Departamentos (Nodos Centrales)</span>
        </div>
        <div style="display: flex; align-items: center; gap: 8px;">
            <i class="fas fa-desktop" style="color: var(--accent-cyan); font-size: 1.2rem;"></i>
            <span style="color: var(--text-secondary); font-size: 0.9rem;">Equipos Activos (Nodos Conectados)</span>
        </div>
    </div>

    <!-- Contenedor del Mapa -->
    <div id="mapaRed" style="height: 600px; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden;"></div>
</div>

<!-- Librería vis.js desde CDN -->
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const container = document.getElementById('mapaRed');
    
    // Opciones visuales (Tema Cyberpunk oscuro)
    const options = {
        nodes: {
            font: { color: '#e2e8f0', size: 14, face: 'Space Grotesk' },
            borderWidth: 2,
            shadow: { enabled: true, color: 'rgba(0, 245, 212, 0.3)', size: 10 }
        },
        edges: {
            smooth: { type: 'continuous' },
            width: 1
        },
        physics: {
            // Hace que los nodos se separen automáticamente de forma fluida
            barnesHut: { gravitationalConstant: -3000, centralGravity: 0.3, springLength: 150 },
            stabilization: { iterations: 100 }
        },
        interaction: {
            hover: true,
            tooltipDelay: 200,
            zoomView: true,
            dragView: true,
            dragNodes: true // Permite mover los equipos con el mouse
        }
    };

    // Cargar datos desde la API
    fetch('{% url "api_datos_mapa_red" %}')
    .then(r => r.json())
    .then(data => {
        const nodes = new vis.DataSet(data.nodes);
        const edges = new vis.DataSet(data.edges);
        const network = new vis.Network(container, { nodes, edges }, options);
        
        network.on("stabilizationIterationsDone", function() {
            // Cuando termine de ordenarse, hacer un zoom para que quepa todo
            network.fit({ animation: { duration: 1000, easingFunction: "easeInOutQuad" } });
        });
    });
});
</script>
{% endblock %}
